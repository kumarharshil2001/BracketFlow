name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - find firebase-config.js
        run: |
          echo "=== Repo root contents ==="
          ls -la
          echo "=== Looking for firebase-config.js ==="
          find . -name "firebase-config.js" 2>/dev/null
          echo "=== File contents before injection ==="
          find . -name "firebase-config.js" -exec cat {} \;

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          CONFIG_PATH=$(find . -name "firebase-config.js" -not -path "./.git/*" | head -1)
          echo "Config file: $CONFIG_PATH"
          node .github/inject-config.js "$CONFIG_PATH"

      - name: Debug - verify secret env vars
        if: always()
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mask() {
            if [ -z "$1" ]; then
              echo '<empty>'
            elif [ ${#1} -le 8 ]; then
              echo '****'
            else
              echo "${1:0:4}...${1: -4}"
            fi
          }
          echo "FIREBASE_API_KEY present: ${FIREBASE_API_KEY:+yes}"
          echo "FIREBASE_API_KEY masked: $(mask "$FIREBASE_API_KEY")"
          echo "FIREBASE_AUTH_DOMAIN present: ${FIREBASE_AUTH_DOMAIN:+yes}"
          echo "FIREBASE_AUTH_DOMAIN masked: $(mask "$FIREBASE_AUTH_DOMAIN")"
          echo "FIREBASE_PROJECT_ID present: ${FIREBASE_PROJECT_ID:+yes}"
          echo "FIREBASE_PROJECT_ID masked: $(mask "$FIREBASE_PROJECT_ID")"
          echo "FIREBASE_STORAGE_BUCKET present: ${FIREBASE_STORAGE_BUCKET:+yes}"
          echo "FIREBASE_STORAGE_BUCKET masked: $(mask "$FIREBASE_STORAGE_BUCKET")"
          echo "FIREBASE_MESSAGING_SENDER_ID present: ${FIREBASE_MESSAGING_SENDER_ID:+yes}"
          echo "FIREBASE_MESSAGING_SENDER_ID masked: $(mask "$FIREBASE_MESSAGING_SENDER_ID")"
          echo "FIREBASE_APP_ID present: ${FIREBASE_APP_ID:+yes}"
          echo "FIREBASE_APP_ID masked: $(mask "$FIREBASE_APP_ID")"

      - name: Debug - verify injected firebase-config.js
        if: always()
        run: |
          CONFIG_PATH=$(find . -name "firebase-config.js" -not -path "./.git/*" | head -1)
          echo "=== File contents after injection ==="
          cat "$CONFIG_PATH"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
