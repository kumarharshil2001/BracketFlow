name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required permissions for the official Pages deploy action
permissions:
  contents: read   # to check out the repo
  pages: write     # to deploy to Pages
  id-token: write  # to verify the deployment origin

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GUARD: fail immediately if any secret is missing ──────────────────
      # When a GitHub Secret is not set, Actions passes an empty string.
      # sed then replaces placeholders with "", grep reports "OK", and the
      # site is deployed with blank Firebase values. This step catches that.
      - name: Validate secrets are present
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          missing=()
          [ -z "$FIREBASE_API_KEY" ]             && missing+=("FIREBASE_API_KEY")
          [ -z "$FIREBASE_AUTH_DOMAIN" ]         && missing+=("FIREBASE_AUTH_DOMAIN")
          [ -z "$FIREBASE_PROJECT_ID" ]          && missing+=("FIREBASE_PROJECT_ID")
          [ -z "$FIREBASE_STORAGE_BUCKET" ]      && missing+=("FIREBASE_STORAGE_BUCKET")
          [ -z "$FIREBASE_MESSAGING_SENDER_ID" ] && missing+=("FIREBASE_MESSAGING_SENDER_ID")
          [ -z "$FIREBASE_APP_ID" ]              && missing+=("FIREBASE_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following GitHub Secrets are not set:"
            printf '  - %s\n' "${missing[@]}"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "OK: All required secrets are present."

      # ── INJECT: replace placeholders with real values ─────────────────────
      # This edits firebase-config.js on the runner only.
      # Nothing is committed back to main — main always keeps placeholders.
      - name: Inject Firebase config from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g"                         firebase-config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g"                 firebase-config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g"                   firebase-config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g"           firebase-config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" firebase-config.js
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g"                           firebase-config.js

      # ── VERIFY: no placeholder should remain ─────────────────────────────
      - name: Verify injection
        run: |
          if grep -q "__FIREBASE_" firebase-config.js; then
            echo "ERROR: Uninjected placeholders still present:"
            grep "__FIREBASE_" firebase-config.js
            exit 1
          fi
          echo "OK: All Firebase values injected successfully."

      # ── DEPLOY: upload to Pages directly from the runner ─────────────────
      # This bypasses the gh-pages branch entirely. GitHub Pages serves
      # whatever is uploaded here — the injected files from this runner.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # upload the whole repo root (with injected firebase-config.js)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4